<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P9 Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0b0b0a;
  --white: #ece8de;
  --mid: #5a5753;
  --dim: #272521;
  --acid: #c8ff00;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Syne', sans-serif;
  cursor: none;
}

#cur {
  position: fixed;
  width: 5px; height: 5px;
  background: var(--acid);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity .3s;
}

/* ── Full screen layout ── */
.screen {
  height: 100vh;
  display: grid;
  grid-template-rows: 56px 1fr 56px;
  padding: 0 56px;
}

/* ── Nav ── */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--dim);
  opacity: 0;
  animation: fadein .6s ease .1s forwards;
}

.logo {
  display: flex;
  align-items: baseline;
  gap: 5px;
}

.logo-mark {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -.04em;
  color: var(--acid);
  line-height: 1;
}

.logo-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: .22em;
  color: var(--mid);
  text-transform: uppercase;
  padding-bottom: 1px;
}

.nav-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .2em;
  text-transform: uppercase; color: var(--mid);
}

/* ── Center ── */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 40px;
}

.tagline {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .32em;
  text-transform: uppercase; color: var(--mid);
  opacity: 0;
  animation: fadein .6s ease .4s forwards;
}

h1 {
  font-size: clamp(48px, 8.5vw, 130px);
  font-weight: 800;
  line-height: 1;
  letter-spacing: -.03em;
  opacity: 0;
  animation: fadein .8s cubic-bezier(.16,1,.3,1) .6s forwards;
}

h1 .accent { color: var(--acid); }

.sub {
  font-size: clamp(14px, 1.5vw, 18px);
  font-weight: 400;
  color: var(--mid);
  line-height: 1.7;
  max-width: 480px;
  opacity: 0;
  animation: fadein .6s ease 1s forwards;
}

.sub strong { color: var(--white); font-weight: 400; }

/* ── Footer bar ── */
footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--dim);
  opacity: 0;
  animation: fadein .6s ease 1.3s forwards;
}

.f-left {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--mid);
}

.f-email {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: .12em;
  color: var(--white); text-decoration: none;
  transition: color .2s;
}
.f-email:hover { color: var(--acid); }

.f-right {
  display: flex; align-items: center; gap: 8px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: .18em;
  text-transform: uppercase; color: var(--mid);
}

.dot {
  width: 5px; height: 5px;
  background: var(--acid); border-radius: 50%;
  animation: blink 2.8s ease-in-out infinite;
}

@keyframes fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink  { 0%,100% { opacity: 1; } 50% { opacity: .15; } }

@media (max-width: 680px) {
  .screen { padding: 0 28px; }
  h1 { font-size: clamp(44px, 14vw, 72px); }
  .f-email { display: none; }
}
</style>
</head>
<body>

<div id="cur"></div>

<div class="screen">

  <nav>
    <div class="logo">
      <span class="logo-mark">P9</span><span class="logo-sub">LABS</span>
    </div>
    <div class="nav-tag">p9labs.io</div>
  </nav>

  <div class="center">
    <div class="tagline">Technology Laboratory</div>
    <h1>Built once.<br><span class="accent">Built better.</span></h1>
    <p class="sub">
      Most things around us were designed for a world that has since moved on.<br>
      <strong>We take what exists and rebuild it
      closer to the way it should work.</strong>
    </p>
  </div>

  <footer>
    <div class="f-left">© <span id="yr"></span> P9 Labs</div>
    <a href="mailto:hello@p9labs.io" class="f-email">hello@p9labs.io</a>
    <div class="f-right"><div class="dot"></div> Active</div>
  </footer>

</div>

<script>
  document.getElementById('yr').textContent = new Date().getFullYear();
  const cur = document.getElementById('cur');
  document.addEventListener('mousemove', e => {
    cur.style.opacity = '1';
    cur.style.left = e.clientX + 'px';
    cur.style.top = e.clientY + 'px';
  });
</script>
</body>
</html>
